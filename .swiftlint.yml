disabled_rules:
  - trailing_whitespace
  - line_length
  - multiple_closures_with_trailing_closure

opt_in_rules:
  - empty_count
  - empty_string

excluded:
  - .build
  - Packages

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
    error: 80

# Relaxed limits for a small utility app
type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 80
  error: 150
